name: Server
on: [pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres, POSTGRES_DB: currencydesk_test }
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s --health-timeout 5s --health-retries 5
    defaults: { run: { working-directory: server } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm, cache-dependency-path: server/package-lock.json }
      - run: npm ci
      - run: npm run typecheck
      - run: TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/currencydesk_test npm test
      - run: TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/currencydesk_test npm run test:ledger:postgres
