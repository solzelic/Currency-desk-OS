    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');

    const blobUrls = {};

      const entry = manifest[uuid];
      try {

            (entry.compressed ? toBase64(finalBytes) : entry.data);

          const blob = new Blob([finalBytes], { type: entry.mime });

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>

    // attributes through, so match the full opening tag. slice() rather than

    const headOpen = template.match(/<head[^>]*>/i);

      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ace {\n  font-family: 'Space Mono';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"a6ef2e79-f0c2-47a7-b632-7136cb94008c\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n:root {\n  --black: #0a0a0a;\n  --ink: #111111;\n  --white: #ffffff;\n  --paper: #f4f4f2;\n  --gray-1: rgba(255,255,255,0.92);\n  --gray-2: rgba(255,255,255,0.64);\n  --gray-3: rgba(255,255,255,0.40);\n  --hairline: rgba(255,255,255,0.14);\n  --hairline-dark: rgba(10,10,10,0.14);\n  --f-display: 'Archivo', sans-serif;\n  --f-mono: 'Space Mono', monospace;\n  --maxw: 1320px;\n  --ease: cubic-bezier(0.22, 1, 0.36, 1);\n}\n\n* { box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\nbody {\n  margin: 0;\n  background: var(--black);\n  color: var(--gray-1);\n  font-family: var(--f-display);\n  font-size: 16px;\n  line-height: 1.6;\n  -webkit-font-smoothing: antialiased;\n}\n\na { color: inherit; text-decoration: none; }\nimg, video { display: block; max-width: 100%; }\np { margin: 0; }\nh1, h2, h3 { margin: 0; font-weight: 800; letter-spacing: -0.02em; }\n\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 48px; }\n\n/* ---------- type helpers ---------- */\n.eyebrow {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.24em;\n  text-transform: uppercase;\n  color: var(--gray-3);\n}\n.mono { font-family: var(--f-mono); font-size: 12px; }\n\n/* ---------- buttons ---------- */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  justify-content: center;\n  gap: 10px;\n  font-family: var(--f-display);\n  font-weight: 700;\n  font-size: 13px;\n  letter-spacing: 0.06em;\n  text-transform: uppercase;\n  padding: 16px 30px;\n  cursor: pointer;\n  transition: all 0.3s var(--ease);\n  border: 1px solid transparent;\n  white-space: nowrap;\n}\n.btn-solid { background: var(--white); color: var(--black); border-color: var(--white); }\n.btn-solid:hover { background: transparent; color: var(--white); }\n.btn-ghost { border-color: rgba(255,255,255,0.3); color: var(--white); background: transparent; }\n.btn-ghost:hover { border-color: var(--white); background: var(--white); color: var(--black); }\n/* on light sections */\n.btn-dark { background: var(--black); color: var(--white); border-color: var(--black); }\n.btn-dark:hover { background: transparent; color: var(--black); }\n/* ghost on light sections */\n.btn-ghost-dark { background: transparent; color: var(--black); border-color: var(--hairline-dark); }\n.btn-ghost-dark:hover { border-color: var(--black); background: var(--black); color: var(--white); }\n\n/* ============================================================\n   NAV\n   ============================================================ */\n.nav {\n  position: fixed;\n  top: 0; left: 0; right: 0;\n  z-index: 100;\n  background: rgba(10,10,10,0.85);\n  backdrop-filter: blur(16px);\n  -webkit-backdrop-filter: blur(16px);\n  border-bottom: 1px solid var(--hairline);\n}\n.nav-inner {\n  max-width: var(--maxw);\n  margin: 0 auto;\n  padding: 0 48px;\n  height: 76px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 32px;\n}\n.brand { display: flex; flex-direction: column; line-height: 0.9; }\n.brand .yk {\n  font-weight: 900;\n  font-size: 25px;\n  letter-spacing: 0.02em;\n  color: var(--white);\n}\n.brand .sub {\n  font-family: var(--f-mono);\n  font-size: 7.5px;\n  font-weight: 700;\n  letter-spacing: 0.34em;\n  color: var(--gray-3);\n  margin-top: 3px;\n}\n.nav-links { display: flex; gap: 32px; }\n.nav-links a {\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--gray-2);\n  transition: color 0.25s;\n}\n.nav-links a:hover { color: var(--white); }\n.nav .btn { padding: 12px 22px; font-size: 12px; }\n/* elevation once the page is scrolled */\n.nav { transition: background 0.3s var(--ease), box-shadow 0.3s var(--ease); }\n.nav.scrolled {\n  background: rgba(10,10,10,0.94);\n  box-shadow: 0 12px 34px rgba(0,0,0,0.4);\n}\n/* active nav link underline */\n.nav-links a { position: relative; }\n.nav-links a::after {\n  content: \"\";\n  position: absolute;\n  left: 0; right: 0; bottom: -6px;\n  height: 1px;\n  background: var(--white);\n  transform: scaleX(0);\n  transform-origin: left;\n  transition: transform 0.28s var(--ease);\n}\n.nav-links a:hover::after { transform: scaleX(1); }\n\n/* ============================================================\n   HERO — video bg + headline + rate board\n   ============================================================ */\n.hero {\n  position: relative;\n  min-height: 100vh;\n  display: flex;\n  align-items: center;\n  overflow: hidden;\n  padding: 150px 0 90px;\n}\n.hero-fallback {\n  position: absolute;\n  inset: 0;\n  overflow: hidden;\n  z-index: 0;\n}\n.hero-fallback img {\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  filter: brightness(0.45) contrast(1.15);\n  transition: filter 0.5s;\n}\n@media (prefers-reduced-motion: no-preference) {\n  .hero-fallback img { animation: drift 36s ease-in-out infinite alternate; }\n}\n@keyframes drift {\n  from { transform: scale(1.04) translate(0, 0); }\n  to   { transform: scale(1.12) translate(-1.5%, 1.5%); }\n}\n.hero-video {\n  position: absolute;\n  inset: 0;\n  width: 100%;\n  height: 100%;\n  object-fit: cover;\n  filter: brightness(0.5) contrast(1.1) blur(7px);\n  transform: scale(1.06); /* hide blurred edge fringe */\n  z-index: 0;\n  opacity: 0;\n  transition: opacity 1.2s ease;\n}\n.hero-video.playing { opacity: 1; }\n.hero-scrim {\n  position: absolute;\n  inset: 0;\n  z-index: 1;\n  background:\n    linear-gradient(to right, rgba(10,10,10,0.88) 0%, rgba(10,10,10,0.55) 55%, rgba(10,10,10,0.35) 100%),\n    linear-gradient(to top, var(--black) 0%, transparent 22%);\n}\n.hero .wrap {\n  position: relative;\n  z-index: 2;\n  width: 100%;\n  display: grid;\n  grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);\n  gap: 72px;\n  align-items: center;\n}\n\n.hero-copy { display: flex; flex-direction: column; gap: 26px; }\n.hero-copy h1 {\n  font-size: clamp(46px, 4.6vw, 76px);\n  line-height: 1.02;\n  color: var(--white);\n}\n.hero-sub {\n  font-size: 17px;\n  line-height: 1.7;\n  color: var(--gray-2);\n  max-width: 460px;\n}\n.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }\n.chips { display: flex; gap: 10px; flex-wrap: wrap; }\n.chip {\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--gray-2);\n  border: 1px solid var(--hairline);\n  padding: 7px 13px;\n}\n\n/* ---- staged entrance ---- */\n@media (prefers-reduced-motion: no-preference) {\n  .hero-copy > *, .board { opacity: 0; transform: translateY(22px); animation: rise 0.9s var(--ease) forwards; }\n  .hero-copy > *:nth-child(1) { animation-delay: 0.15s; }\n  .hero-copy > *:nth-child(2) { animation-delay: 0.25s; }\n  .hero-copy > *:nth-child(3) { animation-delay: 0.35s; }\n  .hero-copy > *:nth-child(4) { animation-delay: 0.45s; }\n  .hero-copy > *:nth-child(5) { animation-delay: 0.55s; }\n  .board { animation-delay: 0.5s; }\n}\n@keyframes rise { to { opacity: 1; transform: none; } }\n\n/* ---- live rate board ---- */\n.board {\n  background: rgba(10,10,10,0.72);\n  backdrop-filter: blur(14px);\n  -webkit-backdrop-filter: blur(14px);\n  border: 1px solid var(--hairline);\n  padding: 28px;\n}\n.board-head {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: 22px;\n}\n.board-head .live {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.2em;\n  text-transform: uppercase;\n  color: var(--white);\n  display: flex;\n  align-items: center;\n  gap: 9px;\n}\n.live-dot {\n  width: 7px; height: 7px;\n  border-radius: 50%;\n  background: var(--white);\n  animation: pulse 2.2s ease-in-out infinite;\n}\n@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.25; } }\n.board-head .updated {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  color: var(--gray-3);\n}\n.board-grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  border-top: 1px solid var(--hairline);\n  border-left: 1px solid var(--hairline);\n}\n.rate {\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  padding: 18px 20px;\n  border-right: 1px solid var(--hairline);\n  border-bottom: 1px solid var(--hairline);\n  transition: background 0.3s var(--ease);\n}\n.rate:hover { background: rgba(255,255,255,0.05); }\n.rate .pair {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.14em;\n  color: var(--gray-3);\n}\n.rate .big {\n  font-family: var(--f-mono);\n  font-weight: 700;\n  font-size: 26px;\n  color: var(--white);\n  letter-spacing: -0.02em;\n  font-variant-numeric: tabular-nums;\n}\n.rate .delta {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  color: #34b46a;\n  transition: color 0.3s;\n}\n.rate .delta.down { color: #e05252; }\n/* tweak: strict B&W deltas */\nbody.tw-bw-deltas .rate .delta.up { color: var(--gray-2); }\nbody.tw-bw-deltas .rate .delta.down { color: var(--gray-3); }\n.rate.flash .big { animation: flash 0.6s var(--ease); }\n@keyframes flash { 0% { opacity: 0.2; } 100% { opacity: 1; } }\n.board-foot {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-top: 22px;\n  gap: 16px;\n}\n.board-foot .more {\n  font-family: var(--f-mono);\n  font-size: 12px;\n  color: var(--gray-3);\n  transition: color 0.25s;\n}\n.board-foot .more:hover { color: var(--white); }\n.board-foot .btn { padding: 12px 22px; font-size: 12px; }\n\n/* ============================================================\n   SECTIONS\n   ============================================================ */\n.section { padding: 110px 0; }\n.section.paper { background: var(--paper); color: var(--ink); }\n.section-head { margin-bottom: 56px; display: flex; flex-direction: column; gap: 14px; }\n.section h2 { font-size: clamp(34px, 3.4vw, 56px); line-height: 1.08; }\n.section.paper .eyebrow { color: rgba(10,10,10,0.45); }\n.lede { font-size: 17px; line-height: 1.7; max-width: 560px; }\n.section .lede { color: var(--gray-2); }\n.section.paper .lede { color: rgba(10,10,10,0.65); }\n\n/* scroll reveal */\n.reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.9s var(--ease), transform 0.9s var(--ease); }\n.reveal.in { opacity: 1; transform: none; }\n@media (prefers-reduced-motion: reduce) { .reveal { opacity: 1; transform: none; } }\n\n/* ============================================================\n   CONVERTER STRIP (paper)\n   ============================================================ */\n.conv-grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 80px;\n  align-items: center;\n}\n.converter {\n  background: var(--white);\n  border: 1px solid var(--hairline-dark);\n  padding: 34px;\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n}\n.conv-field {\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n  padding: 18px 0;\n}\n.conv-field label {\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: rgba(10,10,10,0.45);\n}\n.conv-row {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  gap: 18px;\n}\n.conv-row input, .conv-row .amt {\n  font-family: var(--f-mono);\n  font-weight: 700;\n  font-size: 32px;\n  letter-spacing: -0.02em;\n  color: var(--ink);\n  background: transparent;\n  border: 0;\n  outline: 0;\n  padding: 0;\n  width: 100%;\n  font-variant-numeric: tabular-nums;\n}\n.conv-row select {\n  font-family: var(--f-mono);\n  font-weight: 700;\n  font-size: 14px;\n  letter-spacing: 0.06em;\n  color: var(--ink);\n  background: transparent;\n  border: 1px solid var(--hairline-dark);\n  padding: 10px 14px;\n  cursor: pointer;\n  outline: 0;\n}\n.conv-mid {\n  display: flex;\n  align-items: center;\n  40px;\n}\n.use { display: flex; flex-direction: column; gap: 18px; }\n.use .img {\n  aspect-ratio: 4 / 3;\n  overflow: hidden;\n  background: #e2e2df;\n}\n.use .img img {\n  width: 100%; height: 100%;\n  object-fit: cover;\n  filter: none;\n  transition: transform 0.8s var(--ease), filter 0.5s;\n}\n/* tweak: strict B&W photography */\nbody.tw-bw-images .use .img img { filter: grayscale(1) contrast(1.05); }\nbody.tw-bw-images .visit-map img { filter: grayscale(1) brightness(0.85); }\nbody.tw-bw-images .hero-fallback img { filter: grayscale(1) brightness(0.45) contrast(1.15); }\nbody.tw-bw-images .hero-video { filter: grayscale(1) brightness(0.5) contrast(1.1) blur(7px); }\n.use:hover .img img { transform: scale(1.04); }\n.use h3 { font-size: 21px; }\n.use p { font-size: 14.5px; line-height: 1.65; color: rgba(10,10,10,0.6); }\n\n/* ============================================================\n   LOCATION + LEAD (black)\n   ============================================================ */\n.visit-grid {\n  display: grid;\n  grid-template-columns: 1.1fr 0.9fr;\n  gap: 80px;\n  align-items: start;\n}\n.visit-info { display: flex; flex-direction: column; gap: 26px; }\n.visit-info h2 { color: var(--white); }\n.addr-rows { display: flex; flex-direction: column; border-top: 1px solid var(--hairline); }\n.addr-row {\n  display: grid;\n  grid-template-columns: 130px 1fr;\n  gap: 24px;\n  padding: 18px 0;\n  border-bottom: 1px solid var(--hairline);\n}\n.addr-row .k {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--gray-3);\n  padding-top: 3px;\n}\n.addr-row .v { font-size: 15.5px; font-weight: 600; color: var(--gray-1); line-height: 1.6; }\n.visit-map {\n  aspect-ratio: 16 / 8;\n  overflow: hidden;\n  border: 1px solid var(--hairline);\n}\n.visit-map img {\n  width: 100%; height: 100%;\n  object-fit: cover;\n  filter: none;\n  transition: filter 0.5s;\n}\n\n/* lead form */\n.lead {\n  border: 1px solid { grid-template-columns: 1fr; }\n  .lead { padding: 26px; }\n  .conv-row input, .conv-row .amt { font-size: 25px; }\n}\n<\u002Fstyle>\n<style>/* ============================================================\n   YORK FX — Staff Rate Editor\n   A LIGHT back-office theme (the public site is dark; this tool\n   is read all day, so it uses the paper palette for legibility).\n   Brand type stays Archivo + Space Mono from yorkfx.css.\n   ============================================================ */\n\n/* this page only: paper background + dark ink */\nbody.staff { background: var(--paper); color: var(--ink); }\n\n.staff-main { padding-top: 76px; min-height: 100vh; }\n[hidden] { display: none !important; }\n/* embedded inside CurrencyDesk OS: hide the public nav, reclaim the space */\nhtml.embed .nav { display: none; }\nhtml.embed .staff-main { padding-top: 0; }\nhtml.embed .signin-wrap { min-height: calc(100vh - 0px); }\nhtml.embed body { background: var(--paper); }\n\n/* local light tokens */\n.staff {\n  --line: rgba(10,10,10,0.13);\n  --line-soft: rgba(10,10,10,0.08);\n  --muted: rgba(10,10,10,0.56);\n  --faint: rgba(10,10,10,0.40);\n  --surface: #ffffff;\n}\n\n/* nav: keep the dark brand bar, add a staff badge */\n.nav .staff-badge {\n  font-family: var(--f-mono);\n  font-size: 10px;\n  letter-spacing: 0.22em;\n  text-transform: uppercase;\n  color: var(--gray-3);\n  border: 1px solid var(--hairline);\n  padding: 6px 11px;\n}\n.nav .nav-right { display: flex; align-items: center; gap: 18px; }\n.nav .signout {\n  font-family: var(--f-mono);\n  font-size: 12px;\n  color: var(--gray-3);\n  cursor: pointer;\n  background: none;\n  border: 0;\n  transition: color 0.25s;\n}\n.nav .signout:hover { color: var(--white); }\n\n/* ============================================================\n   SIGN-IN\n   ============================================================ */\n.signin-wrap {\n  min-height: calc(100vh - 76px);\n  display: grid;\n  place-items: center;\n  padding: 60px 24px;\n}\n.signin-card {\n  width: 100%;\n  max-width: 400px;\n  border: 1px solid var(--line);\n  background: var(--surface);\n  box-shadow: 0 24px 60px rgba(10,10,10,0.07);\n  padding: 44px 40px 38px;\n  display: flex;\n  flex-direction: column;\n}\n.signin-card .brand { align-items: center; margin: 0 auto 26px; }\n.signin-card .brand .yk { font-size: 28px; color: var(--ink); }\n.signin-card .brand .sub { color: var(--faint); }\n.signin-card h1 {\n  font-size: 22px;\n  font-weight: 800;\n  color: var(--ink);\n  text-align: center;\n}\n.signin-card .sub-note {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.04em;\n  color: var(--muted);\n  text-align: center;\n  margin-top: 8px;\n  margin-bottom: 28px;\n}\n.signin-card form { display: flex; flex-direction: column; gap: 14px; }\n.field-label {\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.18em;\n  text-transform: uppercase;\n  color: var(--muted);\n  margin-bottom: 8px;\n  display: block;\n}\n.signin-card input {\n  font-family: var(--f-display);\n  font-size: 15px;\n  color: var(--ink);\n  background: #fafafa;\n  border: 1px solid var(--line);\n  padding: 15px 16px;\n  outline: 0;\n  width: 100%;\n  transition: border-color 0.3s, background 0.3s;\n}\n.signin-card input::placeholder { color: var(--faint); }\n.signin-card input:focus { border-color: var(--ink); background: #fff; }\n.signin-card .btn { margin-top: 10px; }\n.signin-error {\n  font-family: var(--f-mono);\n  font-size: 11.5px;\n  color: #c0392b;\n  min-height: 16px;\n  margin-top: 4px;\n  text-align: center;\n}\n.signin-hint {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  line-height: 1.7;\n  color: var(--muted);\n  text-align: center;\n  margin-top: 22px;\n  padding-top: 18px;\n  border-top: 1px solid var(--line);\n}\n.signin-hint b { color: var(--ink); font-weight: 700; }\n\n/* ============================================================\n   EDITOR\n   ============================================================ */\n.editor { padding: 46px 0 90px; }\n\n.ed-head {\n  display: flex;\n  align-items: flex-end;\n  justify-content: space-between;\n  gap: 28px;\n  flex-wrap: wrap;\n  margin-bottom: 30px;\n}\n.editor .eyebrow { color: var(--faint); }\n.ed-head h1 {\n  font-size: clamp(30px, 3.4vw, 44px);\n  font-weight: 800;\n  color: var(--ink);\n  letter-spacing: -0.02em;\n  margin: 10px 0 8px;\n}\n.ed-meta {\n  font-family: var(--f-mono);\n  font-size: 11.5px;\n  color: var(--muted);\n  display: flex;\n  align-items: center;\n  gap: 8px;\n}\n.ed-actions { display: flex; align-items: center; gap: 22px; }\n.ed-actions-info {\n  display: flex;\n  flex-direction: column;\n  align-items: flex-end;\n  gap: 10px;\n  margin-top: -6px; /* nudge the status pill up a little */\n}\n.ed-since {\n  font-family: var(--f-mono);\n  font-size: 11.5px;\n  color: var(--muted);\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  white-space: nowrap;\n}\n.ed-since b {\n  color: var(--ink);\n  font-weight: 700;\n  font-variant-numeric: tabular-nums;\n}\n.ed-since .tdot {\n  width: 6px; height: 6px;\n  border-radius: 50%;\n  background: #1f8a4c;\n  flex: none;\n  animation: pulse 2.2s ease-in-out infinite;\n}\n.ed-since.fresh .tdot { background: #c0392b; }\n.status {\n  font-family: var(--f-mono);\n  font-size: 11px;\n  letter-spacing: 0.1em;\n  text-transform: uppercase;\n  color: var(--muted);\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n  white-space: nowrap;\n}\n.status .dot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: var(--faint);\n}\n.status.dirty { color: var(--ink); }\n.status.dirty .dot { background: #c0392b; animation: pulse 2.2s ease-in-out infinite; }\n.ed-actions .btn[disabled] { opacity: 0.3; cursor: not-allowed; pointer-events: none; }\n\n/* controls row */\n.ed-controls {\n  display: grid;\n  grid-template-columns: auto auto 1fr;\n  gap: 18px;\n  align-items: end;\n  padding: 22px 24px;\n  border: 1px solid var(--l stify-content: space-between;\n  gap: 14px; flex-wrap: wrap; padding: 13px 24px;\n  border-top: 1px solid var(--line); background: #fafafa;\n}\n.add-ccy-info { display: flex; flex-direction: column; gap: 2px; }\n.add-ccy-label { font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }\n.add-ccy-sub { font-family: var(--f-mono); font-size: 11px; color: var(--faint); }\n.add-ccy-pick { position: relative; }\n.add-ccy-btn {\n  font-family: var(--f-mono); font-size: 11px; font-weight: 700;\n  letter-spacing: 0.06em; text-transform: uppercase;\n  background: var(--ink); color: #fff; border: 1px solid var(--ink);\n  padding: 10px 16px; cursor: pointer; transition: background 0.2s, transform 0.08s;\n}\n.add-ccy-btn:hover { background: #000; }\n.add-ccy-btn:active { transform: scale(0.97); }\n.add-ccy-btn.on { background: #000; }\n.add-ccy-btn[disabled] { opacity: 0.4; cursor: not-allowed; }\n.add-menu {\n  position: absolute; right: 0; bottom: calc(100% + 8px);\n  width: 300px; max-height: 300px; overflow: auto;\n  background: #fff; border: 1px solid var(--line);\n  box-shadow: 0 18px 44px rgba(10,10,10,0.18); z-index: 30; padding: 6px;\n}\n.add-item {\n  display: flex; align-items: center; gap: 10px; width: 100%;\n  padding: 9px 10px; border: 0; background: transparent; cursor: pointer;\n  text-align: left; transition: background 0.15s;\n}\n.add-item:hover { background: #f1f0ec; }\n.add-item .ai-flag { font-size: 17px; line-height: 1; }\n.add-item .ai-code { font-family: var(--f-mono); font-weight: 700; font-size: 13px; color: var(--ink); width: 42px; }\n.add-item .ai-name { font-size: 12.5px; color: var(--muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }\n.add-item .ai-plus { font-family: var(--f-mono); font-size: 16px; color: var(--faint); }\n.add-item:hover .ai-plus { color: var(--ink); }\n.add-empty { padding: 18px 12px; text-align: center; font-family: var(--f-mono); font-size: 11.5px; color: var(--muted); }\n/* per-row remove */\n.tg-cell { display: flex; align-items: center; justify-content: flex-end; gap: 8px; }\n.tg { width: auto; padding: 7px 12px; }\n.rm {\n  width: 28px; height: 28px; flex: none; border: 1px solid var(--line);\n  background: #fff; color: var(--faint); font-size: 16px; line-height: 1;\n  cursor: pointer; transition: border-color 0.18s, color 0.18s;\n}\n.rm:hover { border-color: #c0392b; color: #c0392b; }\n\n/* ---- rate feed provider strip (bottom of the board) ---- */\n.feed-provider {\n  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;\n  margin-top: 16px; padding: 14px 18px;\n  border: 1px solid var(--line); background: var(--surface);\n}\n.fp-label {\n  font-family: var(--f-mono); font-size: 10px; letter-spacing: 0.14em;\n  text-transform: uppercase; color: var(--muted);\n}\n.fp-select { position: relative; display: inline-flex; align-items: center; }\n.fp-select select {\n  appearance: none; -webkit-appearance: none;\n  font-family: var(--f-display); font-size: 13px; font-weight: 600; color: var(--ink);\n  background: #fff; border: 1px solid var(--line);\n  padding: 8px 30px 8px 12px; cursor: pointer; outline: 0;\n  transition: border-color 0.2s;\n}\n.fp-select select:hover { border-color: var(--ink); }\n.fp-chev { position: absolute; right: 10px; pointer-events: none; color: var(--faint); font-size: 11px; }\n.fp-note { font-family: var(--f-mono); font-size: 11px; color: var(--faint); flex: 1; min-width: 200px; }\n@media (max-width: 860px) { .fp-note { flex-basis: 100%; } }\n\n@media (max-width: 860px) {\n  .ed-controls { grid-template-columns: 1fr 1fr; }\n  .ctrl.search { grid-column: 1 / -1; }\n  .et-head { display: none; }\n  .et-row.data {\n    grid-template-columns: 1fr 1fr;\n    gap: 12px 18px;\n    padding: 16px 18px;\n    align-items: start;\n  }\n  .cur-cell { grid-column: 1 / -1; }\n  .out::before {\n    content: attr(data-k);\n    display: block;\n    font-size: 9px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--faint);\n    margin-bottom: 4px;\n  }\n  .tg { width: 100%; }\n}\n\n/* ============================================================\n   v2 — feed bar · per-row spread · change arrows · member col\n   ============================================================ */\n\n/* ---- live feed status bar ---- */\n.feed-bar {\n  display: flex;\n  align-items: center;\n  gap: 18px;\n  flex-wrap: wrap;\n  padding: 12px 20px;\n  margin-bottom: 14px;\n  border: 1px solid var(--line);\n  background: var(--surface);\n  font-family: var(--f-mono);\n  font-size: 11.5px;\n  color: var(--muted);\n}\n.feed-state {\n  display: inline-flex;\n  align-items: center;\n  gap: 9px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--ink);\n  font-weight: 700;\n  font-size: 10.5px;\n}\n.fdot {\n  width: 8px; height: 8px;\n  border-radius: 50%;\n  background: #1f8a4c;\n  box-shadow: 0 0 0 3px rgba(31,138,76,0.16);\n  animation: pulse 2.2s ease-in-out infinite;\n  flex: none;\n}\n.feed-bar.stale .fdot { background: #c0392b; box-shadow: 0 0 0 3px rgba(192,57,43,0.16); }\n.feed-bar.stale .feed-state { color: #c0392b; }\n.feed-sep { width: 1px; height: 16px; background: var(--line); }\n.feed-info b { color: var(--ink); font-weight: 700; font-variant-numeric: tabular-nums; }\n.feed-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }\n\n/* lock-rates button (repurposed from the old member-column toggle) */\n.lockbtn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  font-family: var(--f-mono);\n  font-size: 10.5px;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n  color: var(--muted);\n  background: #fff;\n  border: 1px solid var(--line);\n  padding: 8px 14px;\n  cursor: pointer;\n  transition: all 0.2s;\n}\n.lockbtn:hover { border-color: var(--ink); color: var(--ink); }\n.lockbtn svg { width: 13px; height: 13px; flex: none; }\n.lockbtn .ic-closed { display: none; }\n.
