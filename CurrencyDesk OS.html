<script>
  // Silence the benign "ResizeObserver loop" notification (a known browser false-positive
  // that fires when observer callbacks adjust layout — harmless, not an app error).
  (function () {
    const swallow = (msg) => typeof msg === 'string' && msg.indexOf('ResizeObserver loop') !== -1;
    window.addEventListener('error', function (e) { if (swallow(e && e.message)) { e.stopImmediatePropagation(); e.preventDefault(); } }, true);
    const _err = window.console && console.error;
    if (_err) console.error = function () { if (swallow(arguments[0])) return; return _err.apply(console, arguments); };
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<script>
  // apply the persisted appearance (light / dark / auto) BEFORE first paint
  (function () {
    try {
      var p = localStorage.getItem('cdos_theme') || 'light';
      var t = p === 'auto' ? (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : (p === 'dark' ? 'dark' : 'light');
      document.documentElement.setAttribute('data-cdtheme', t);
      document.documentElement.style.colorScheme = t;
    } catch (e) {}
  })();
</script>
<style>
  html, body, #root { height: 100%; margin: 0; }
  body { font-family: 'Archivo', system-ui, sans-serif; }
  #os, #lock { font-family: 'Archivo', system-ui, sans-serif; }
  /* keep module text in brand type even though modules use Tailwind */
  .win-body, .win-body table, .win-body input, .win-body select, .win-body button { font-family: 'Archivo', system-ui, sans-serif; }
  @media print { body * { visibility: hidden !important; } #rcpt, #rcpt * { visibility: visible !important; } #rcpt { position: absolute; left: 0; top: 0; width: 320px; } }
</style>
<script>
  // swallow benign ResizeObserver noise
  window.addEventListener('error', function (e) {
    if (e && e.message && e.message.indexOf('ResizeObserver') !== -1) { e.stopImmediatePropagation(); return true; }
  }, true);
  // the ResizeObserver "loop completed/limit" notice is benign and surfaces on
  // the console channel too — drop ONLY that message, keep every real error.
  (function () {
    var _ce = console.error;
    console.error = function () {
      var a0 = arguments[0];
      if (typeof a0 === 'string' && a0.indexOf('ResizeObserver') !== -1) return;
      return _ce.apply(console, arguments);
    };
  })();
</script>
