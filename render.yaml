# Render blueprint — one web service: the CurrencyDesk OS prototype + API,
# same origin, auto-deployed on every push to main.
#
# One-time setup in the Render dashboard (each marked sync:false below):
#   DATABASE_URL  — Neon Postgres connection string (neon.tech, free tier)
#   OXR_APP_ID    — openexchangerates.org App ID (hourly market rates)
#   SEED_PASSWORD — FIRST-BOOT bootstrap only: the initial password for the
#                   seeded accounts when the database is brand new. Once
#                   accounts exist, passwords are per-employee and managed
#                   in-app (Settings → Employees); this var is ignored.
#   RESET_STAFF_PASSWORD — break-glass, normally UNSET. "staffId:newpassword"
#                   resets that one account at boot (audited, temporary
#                   password). Remove it right after signing back in.
services:
  - type: web
    name: currencydesk
    runtime: node
    # free tier: $0, sleeps after ~15 idle minutes (~30s wake on next visit).
    # switch to "starter" ($7/mo) for always-on once customers rely on it.
    plan: free
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATIC_DIR
        value: ..
      - key: STATIC_INDEX
        value: CurrencyDesk OS.html
      - key: DATABASE_URL
        sync: false
      - key: OXR_APP_ID
        sync: false
      - key: SEED_PASSWORD
        sync: false
