# Render blueprint — one web service: the CurrencyDesk OS prototype + API,
# same origin, auto-deployed on every push to main.
#
# One-time setup in the Render dashboard (each marked sync:false below):
#   DATABASE_URL  — Neon Postgres connection string (neon.tech, free tier)
#   OXR_APP_ID    — openexchangerates.org App ID (hourly market rates)
#   SEED_PASSWORD — the staff sign-in password for the live site (pick a
#                   strong one; the local-dev default is NOT used in prod)
services:
  - type: web
    name: currencydesk
    runtime: node
    plan: starter
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STATIC_DIR
        value: ..
      - key: STATIC_INDEX
        value: CurrencyDesk OS.html
      - key: DATABASE_URL
        sync: false
      - key: OXR_APP_ID
        sync: false
      - key: SEED_PASSWORD
        sync: false
